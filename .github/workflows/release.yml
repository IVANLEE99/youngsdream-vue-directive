# 一个简单的 GitHub Pages 部署工作流
name: Deploy static content to Pages

on:
  # 仅在推送到默认分支时运行
  push:
    branches: ['main']

  # 这个选项可以使你手动在 Action tab 页面触发工作流
  workflow_dispatch:

# 设置 GITHUB_TOKEN 的权限，以允许部署到 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 允许一个并发部署
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  # 单次部署的工作描述
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      # 安装 pnpm（关键）
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
      # 安装 Node
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'pnpm'
      # 清理 node_modules 和 pnpm-lock.yaml
      - name: Clean dependencies
        run: rm -rf node_modules pnpm-lock.yaml
      # 安装依赖（workspace 模式）
      - name: Install dependencies
        run: pnpm install

      # 安装 Vue2 依赖
      - name: Install Vue2 dependencies
        run: pnpm add vue@2.7.16 vue-template-compiler@2.7.16 -F vue2-demo

      # 先构建所有 packages（核心库）
      - name: Build packages
        run: pnpm build

      # 配置 GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v5
      # 上传构建产物
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          # 上传 dist 文件夹
          path: 'examples'
      # 部署到 GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4